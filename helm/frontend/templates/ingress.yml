apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    kubernetes.io/ingress.class: {{ .Values.ingressClass }}
    # If you need path rewrite for a capture group, use this and use a matching path with a capture:
    # nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: {{ .Values.ingressClass }}
  # Use defaultBackend for all traffic
  defaultBackend:
    service:
      name: {{ .Release.Name }}-service
      port:
        number: {{ .Values.ingress_frontendPort }}
  # Optional TLS block (uncomment and adjust secretName if you have TLS)
  # tls:
  #   - hosts:
  #       - {{ .Release.Name }}.dev
  #     secretName: {{ .Values.tlsSecret | default (printf "%s-tls" .Release.Name) }}